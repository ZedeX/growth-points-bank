name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: data/gpb.db
      PARENT_JWT_SECRET: test-parent-secret-32-chars-minimum-length
      CHILD_JWT_SECRET: test-child-secret-32-chars-minimum-length
      AUTH_HMAC_SECRET: test-hmac-secret-32-chars-minimum
      DATA_ENCRYPTION_KEY: test-encryption-key-32-bytes-long!!  # 32 bytes for AES-256
      NODE_ENV: test
      ENABLE_SCHEDULER: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # version is auto-detected from package.json "packageManager" field

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Approve native builds
        run: pnpm approve-builds better-sqlite3 argon2 esbuild es5-ext || true

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint (skip if not configured)
        run: pnpm lint || true

      - name: Run migrations
        run: pnpm db:migrate

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build
