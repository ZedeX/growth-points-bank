# ===== Conflicts detected (8) =====
conflicts:
  - id: Conflict-1
    title: "Schema name mismatch"
    type: blocking
    docs: ["ARCHITECTURE.md §3", "DETAILED_DESIGN.md §11 schema.ts"]
    claim_a: "gpb_public schema"
    claim_b: "pgSchema('app')"
    resolution: "Pick 'app' (code-first); update ARCHITECTURE.md §3"

  - id: Conflict-2
    title: "Directory structure conflict"
    type: blocking
    docs: ["DETAILED_DESIGN.md §12.1", "ARCHITECTURE.md §B"]
    claim_a: "Single package src/server/modules/..."
    claim_b: "pnpm workspace monorepo apps/api + apps/web"
    resolution: "Adopt monorepo; update DETAILED_DESIGN §12.1"

  - id: Conflict-3
    title: "Retry backoff algorithm conflict"
    type: non-blocking
    docs: ["ADR-0003 §retry", "DETAILED_DESIGN.md §4.4", "ADR-0010 §withRetry"]
    claim_a: "Linear sleep(50 * attempt)"
    claim_b: "Exponential 50ms × 2^attempt"
    claim_c: "Exponential backoffMs * Math.pow(2, attempt) base=1000ms"
    resolution: "Unify on exponential; ADR-0003 revise; distinguish DB-conflict vs job-failure backoff classes"

  - id: Conflict-4
    title: "UNIQUE index definition conflict"
    type: non-blocking
    docs: ["ADR-0003", "DETAILED_DESIGN.md §5.2 #6"]
    claim_a: "uq_point_tx_source ON (source_type, source_id)"
    claim_b: "uq_point_transaction_source ON (child_id, source_type, source_id) WHERE source_type IN (...)"
    resolution: "Adopt B (partial unique + child_id); update ADR-0003"

  - id: Conflict-5
    title: "Audit log primary key type conflict"
    type: non-blocking
    docs: ["ADR-0005 weekly_review_access_log", "project UUID standard"]
    claim_a: "BIGSERIAL PRIMARY KEY"
    claim_b: "UUID (project convention)"
    resolution: "Keep BIGSERIAL with explicit rationale note, OR switch to UUID; document decision in ADR-0005"

  - id: Conflict-6
    title: "ADR-0009 cross-reference error (access_token storage)"
    type: blocking
    docs: ["ADR-0009 §'What is Encrypted vs Plain'", "ADR-0002"]
    claim_a: "children.access_token is 'Already hashed (ADR-0002)'"
    claim_b: "ADR-0002 requires plaintext access_token for DB lookup"
    resolution: "A real decision is missing; recommend ADR-0019 or revise ADR-0002 — dual-store access_token_hash + access_token_hint"

  - id: Conflict-7
    title: "Encryption scope Phase conflict (weekly_reviews)"
    type: non-blocking
    docs: ["ADR-0005 MVP simplification", "ADR-0009 encryption table"]
    claim_a: "Skip field-level encryption for now (weekly_reviews)"
    claim_b: "weekly_reviews.best_thing/difficulty/child_request/parent_observation listed as encrypted"
    resolution: "Add 'Phased Rollout' subsection to ADR-0009: Phase 1 encrypts children + diaries; Phase 2 adds reviews"

  - id: Conflict-8
    title: "Crypto API implementation mismatch"
    type: non-blocking
    docs: ["ADR-0005 header", "ADR-0009 implementation"]
    claim_a: "crypto.subtle (Web Crypto API on Node 20)"
    claim_b: "Node classic crypto module (createCipheriv, etc.)"
    resolution: "Unify on Node crypto; update ADR-0005 header"

